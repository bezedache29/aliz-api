openapi: 3.0.3
info:
  title: Aliz API
  version: 1.0.0
  description: API backend pour l'application mobile Aliz (nutrition & planning).

servers:
  - url: https://{domain}/api
    description: Local dev via Traefik (Sail)
    variables:
      domain:
        default: aliz-api.dev.localhost
        description: Valeur de APP_DOMAIN dans .env

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Token statique défini dans .env → STATIC_API_TOKEN"

  schemas:
    FoodPreference:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "019701a2-d3e4-7000-b5f6-000000000020"
        food_name:
          type: string
          example: "Poulet"
        type:
          type: string
          enum: [liked, disliked]

    RecipeIngredientInput:
      type: object
      required:
        - food_name
        - per100g_kcal
        - per100g_proteines
        - per100g_glucides
        - per100g_lipides
        - quantity_g
      properties:
        food_id:
          type: string
          nullable: true
        food_name:
          type: string
        food_source:
          type: string
          nullable: true
          enum: [openfoodfacts, ciqual, aprifel, manual]
        food_brand:
          type: string
          nullable: true
        food_barcode:
          type: string
          nullable: true
        per100g_kcal:
          type: number
          minimum: 0
        per100g_proteines:
          type: number
          minimum: 0
        per100g_glucides:
          type: number
          minimum: 0
        per100g_lipides:
          type: number
          minimum: 0
        per100g_fibres:
          type: number
          nullable: true
          minimum: 0
        per100g_sel:
          type: number
          nullable: true
          minimum: 0
        quantity_g:
          type: number
          minimum: 0

    Recipe:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "019701a2-d3e4-7000-b5f6-000000000001"
        name:
          type: string
        category:
          type: string
          enum:
            - Petit-déjeuner
            - Brunch
            - Entrée
            - Plat principal
            - Soupe
            - Dessert
            - Encas
            - Apéritif
            - Boulangerie
            - Sauce & condiments
        meal:
          type: string
          nullable: true
          enum:
            - Petit-déjeuner
            - Déjeuner
            - Collation
            - Dîner
            - ~
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/RecipeIngredientInput'
        steps:
          type: array
          items:
            type: string
        is_favorite:
          type: boolean
        prep_time:
          type: integer
          nullable: true
          description: Temps de préparation en minutes
        cook_time:
          type: integer
          nullable: true
          description: Temps de cuisson en minutes
        seasons:
          type: array
          items:
            type: string
            enum: [Printemps, Été, Automne, Hiver]
        cooking_method:
          type: string
          nullable: true
          enum: [Four, Poêle, Cookeo, Barbecue, Froid, ~]

    PlanningRecipe:
      type: object
      description: Résumé d'une recette tel que retourné par le planning (macros calculées)
      properties:
        id:
          type: string
          format: uuid
          example: "019701a2-d3e4-7000-b5f6-000000000001"
        name:
          type: string
        kcal:
          type: number
        proteines:
          type: number
        glucides:
          type: number
        lipides:
          type: number
        prep_time:
          type: integer
          nullable: true
        cook_time:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true

    PlanningMeal:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-06-23"
        meal_type:
          type: string
          enum: [Petit-déjeuner, Déjeuner, Collation, Dîner]
        recipe:
          $ref: '#/components/schemas/PlanningRecipe'

    StockItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "019701a2-d3e4-7000-b5f6-000000000002"
        food_name:
          type: string
        food_id:
          type: string
          nullable: true
        food_source:
          type: string
          nullable: true
        food_brand:
          type: string
          nullable: true
        food_barcode:
          type: string
          nullable: true
        per100g_kcal:
          type: number
          nullable: true
        per100g_proteines:
          type: number
          nullable: true
        per100g_glucides:
          type: number
          nullable: true
        per100g_lipides:
          type: number
          nullable: true
        quantity_g:
          type: number
        unit:
          type: string
          example: "g"
        category:
          type: string
          enum:
            - Frais
            - Sec
            - Conserve
            - Surgelé
        state:
          type: string
          nullable: true
          enum:
            - cru
            - cuit
            - ouvert
            - préparé
            - surgelé
        expiry_date:
          type: string
          format: date
          nullable: true
          description: Format YYYY-MM-DD
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "019701a2-d3e4-7000-b5f6-000000000010"
        first_name:
          type: string
          example: "Christophe"
        age:
          type: integer
          example: 43
        gender:
          type: string
          enum: [male, female]
          example: "male"
        height_cm:
          type: integer
          example: 178
        current_weight_kg:
          type: number
          example: 82.5
        target_weight_kg:
          type: number
          example: 75.0
        activity_level:
          type: string
          enum: [sedentary, light, moderate, active, very_active]
          example: "moderate"
        weight_loss_rate_kg:
          type: number
          enum: [0.25, 0.5, 0.75, 1.0]
          example: 0.5
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

paths:

  # ─── Préférences alimentaires ────────────────────────────────

  /preferences:
    get:
      summary: Lister les préférences alimentaires
      tags: [Préférences]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  liked:
                    type: array
                    items:
                      type: string
                  disliked:
                    type: array
                    items:
                      type: string
              example:
                liked: ["Poulet", "Brocoli", "Lentilles"]
                disliked: ["Foie", "Betterave"]

    post:
      summary: Ajouter une préférence alimentaire
      tags: [Préférences]
      description: |
        Si `food_name + type` existe déjà → 409.
        Si `food_name` est dans l'autre liste → elle est retirée automatiquement avant l'ajout.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [food_name, type]
              properties:
                food_name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: "Poulet"
                type:
                  type: string
                  enum: [liked, disliked]
      responses:
        '201':
          description: Préférence ajoutée
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FoodPreference'
              example:
                data:
                  id: "019701a2-d3e4-7000-b5f6-000000000020"
                  food_name: "Poulet"
                  type: "liked"
        '409':
          description: Déjà dans la liste
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Déjà dans la liste"
        '422':
          description: Validation échouée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /preferences/{uuid}:
    parameters:
      - name: uuid
        in: path
        required: true
        description: UUID de la préférence
        example: "019701a2-d3e4-7000-b5f6-000000000020"
        schema:
          type: string
          format: uuid
    delete:
      summary: Supprimer une préférence alimentaire
      tags: [Préférences]
      responses:
        '204':
          description: Supprimée avec succès
        '404':
          description: Préférence introuvable

  # ─── Recettes ───────────────────────────────────────────────

  /recipes:
    get:
      summary: Liste toutes les recettes
      tags: [Recettes]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Recipe'
              example:
                recipes:
                  - id: "018f1e2a-0000-7000-8000-000000000001"
                    name: "Omelette au fromage"
                    category: "Plat principal"
                    meal: "Déjeuner"
                    ingredients: []
                    steps: ["Battre les œufs", "Cuire à feu moyen"]
                    is_favorite: false
                    prep_time: 5
                    cook_time: 10
                    seasons: ["Printemps", "Été", "Automne", "Hiver"]
                    cooking_method: "Poêle"

    post:
      summary: Créer une recette
      tags: [Recettes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, category, ingredients, steps, seasons]
              properties:
                name:
                  type: string
                  maxLength: 255
                category:
                  type: string
                  enum:
                    - Petit-déjeuner
                    - Brunch
                    - Entrée
                    - Plat principal
                    - Soupe
                    - Dessert
                    - Encas
                    - Apéritif
                    - Boulangerie
                    - Sauce & condiments
                meal:
                  type: string
                  nullable: true
                  enum: [Petit-déjeuner, Déjeuner, Collation, Dîner]
                ingredients:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/RecipeIngredientInput'
                steps:
                  type: array
                  items:
                    type: string
                    minLength: 1
                is_favorite:
                  type: boolean
                  default: false
                prep_time:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 65535
                cook_time:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 65535
                seasons:
                  type: array
                  items:
                    type: string
                    enum: [Printemps, Été, Automne, Hiver]
                cooking_method:
                  type: string
                  nullable: true
                  enum: [Four, Poêle, Cookeo, Barbecue, Froid]
      responses:
        '201':
          description: Recette créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Recipe'
              example:
                data:
                  id: "018f1e2a-0000-7000-8000-000000000001"
                  name: "Omelette au fromage"
                  category: "Plat principal"
                  meal: "Déjeuner"
                  ingredients:
                    - food_id: "egg001"
                      food_name: "Œuf entier"
                      food_source: "ciqual"
                      food_brand: null
                      food_barcode: null
                      per100g_kcal: 143
                      per100g_proteines: 12.6
                      per100g_glucides: 0.6
                      per100g_lipides: 9.9
                      per100g_fibres: 0
                      per100g_sel: 0.37
                      quantity_g: 150
                  steps: ["Battre les œufs", "Cuire à feu moyen"]
                  is_favorite: false
                  prep_time: 5
                  cook_time: 10
                  seasons: ["Printemps", "Été", "Automne", "Hiver"]
                  cooking_method: "Poêle"
        '422':
          description: Validation échouée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /recipes/generate:
    post:
      summary: Générer une recette via IA
      tags: [Recettes]
      description: |
        Génère une recette complète via LLM en tenant compte du stock (DLC urgentes en priorité),
        des préférences alimentaires et du profil nutritionnel.
        Si `save=true` (défaut), la recette est sauvegardée en base et retournée via RecipeResource (201).
        Si `save=false`, le JSON brut du LLM est retourné sans sauvegarde (200).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  minLength: 3
                  maxLength: 500
                  example: "Un plat chaud avec du poulet et des légumes de saison"
                save:
                  type: boolean
                  default: true
                  description: Si false, la recette n'est pas sauvegardée en base
      responses:
        '201':
          description: Recette générée et sauvegardée (save=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Recipe'
              example:
                data:
                  id: "019f12f9-eae4-71f2-bb77-21e1e2c72423"
                  name: "Poulet rôti aux légumes d'automne"
                  category: "Plat principal"
                  meal: "Dîner"
                  ingredients:
                    - food_name: "Poulet"
                      food_id: null
                      food_source: null
                      food_brand: null
                      food_barcode: null
                      per100g_kcal: 165
                      per100g_proteines: 31
                      per100g_glucides: 0
                      per100g_lipides: 3.6
                      per100g_fibres: null
                      per100g_sel: null
                      quantity_g: 300
                  steps: ["Préchauffer le four à 200°C", "Enfourner 45 min"]
                  is_favorite: false
                  prep_time: 15
                  cook_time: 45
                  seasons: ["Automne", "Hiver"]
                  cooking_method: "Four"
        '200':
          description: Recette générée sans sauvegarde (save=false) — JSON brut du LLM
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  category:
                    type: string
                  meal:
                    type: string
                    nullable: true
                  cooking_method:
                    type: string
                    nullable: true
                  seasons:
                    type: array
                    items:
                      type: string
                  prep_time:
                    type: integer
                  cook_time:
                    type: integer
                  kcal_estimated:
                    type: number
                  proteines_estimated:
                    type: number
                  glucides_estimated:
                    type: number
                  lipides_estimated:
                    type: number
                  steps:
                    type: array
                    items:
                      type: string
                  ingredients:
                    type: array
                    items:
                      type: object
        '422':
          description: Validation échouée ou réponse LLM invalide
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationError'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "Réponse LLM invalide : not json"

  /recipes/{uuid}:
    parameters:
      - name: uuid
        in: path
        required: true
        description: UUID de la recette
        example: "019701a2-d3e4-7000-b5f6-000000000001"
        schema:
          type: string
          format: uuid

    put:
      summary: Modifier une recette
      tags: [Recettes]
      description: Tous les champs sont optionnels. Si `ingredients` est fourni, les anciens ingrédients sont remplacés.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                category:
                  type: string
                  enum:
                    - Petit-déjeuner
                    - Brunch
                    - Entrée
                    - Plat principal
                    - Soupe
                    - Dessert
                    - Encas
                    - Apéritif
                    - Boulangerie
                    - Sauce & condiments
                meal:
                  type: string
                  nullable: true
                  enum: [Petit-déjeuner, Déjeuner, Collation, Dîner]
                ingredients:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/RecipeIngredientInput'
                steps:
                  type: array
                  items:
                    type: string
                is_favorite:
                  type: boolean
                prep_time:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 65535
                cook_time:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 65535
                seasons:
                  type: array
                  items:
                    type: string
                    enum: [Printemps, Été, Automne, Hiver]
                cooking_method:
                  type: string
                  nullable: true
                  enum: [Four, Poêle, Cookeo, Barbecue, Froid]
      responses:
        '200':
          description: Recette mise à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Recipe'
              example:
                data:
                  id: "018f1e2a-0000-7000-8000-000000000001"
                  name: "Omelette au fromage (modifiée)"
                  category: "Plat principal"
                  meal: "Dîner"
                  ingredients: []
                  steps: ["Battre les œufs", "Ajouter le fromage", "Cuire à feu moyen"]
                  is_favorite: true
                  prep_time: 5
                  cook_time: 10
                  seasons: ["Printemps", "Été"]
                  cooking_method: "Poêle"
        '404':
          description: Recette introuvable
        '422':
          description: Validation échouée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      summary: Supprimer une recette
      tags: [Recettes]
      responses:
        '204':
          description: Supprimée avec succès
        '404':
          description: Recette introuvable

  # ─── Planning ────────────────────────────────────────────────

  /planning/week:
    get:
      summary: Planning de la semaine
      tags: [Planning]
      description: |
        Retourne les repas planifiés sur 7 jours à partir de `from` (inclus).
        Seuls les slots avec une recette assignée sont retournés (recipe_id non null).
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Premier jour de la semaine (YYYY-MM-DD). La réponse couvre `from` à `from + 6 jours`.
          example: "2026-06-23"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meals:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlanningMeal'
              example:
                meals:
                  - date: "2026-06-23"
                    meal_type: "Déjeuner"
                    recipe:
                      id: "018f1e2a-0000-7000-8000-000000000001"
                      name: "Omelette au fromage"
                      kcal: 320.5
                      proteines: 22.0
                      glucides: 1.5
                      lipides: 25.0
                      prep_time: 5
                      cook_time: 10
                      description: null
                  - date: "2026-06-24"
                    meal_type: "Dîner"
                    recipe:
                      id: "019701a2-d3e4-7000-b5f6-000000000001"
                      name: "Poulet rôti"
                      kcal: 480.0
                      proteines: 42.0
                      glucides: 5.0
                      lipides: 30.0
                      prep_time: 15
                      cook_time: 60
                      description: null
        '422':
          description: Paramètre `from` manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /planning/week/{dateKey}/meals/{mealType}/regenerate:
    post:
      summary: Régénérer un repas via LLM
      tags: [Planning]
      parameters:
        - name: dateKey
          in: path
          required: true
          schema:
            type: string
            format: date
          description: Date du repas (YYYY-MM-DD)
          example: "2026-06-23"
        - name: mealType
          in: path
          required: true
          schema:
            type: string
            enum: [Petit-déjeuner, Déjeuner, Collation, Dîner]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  nullable: true
                  maxLength: 500
                  description: Contrainte libre envoyée au LLM (ex. "sans gluten", "rapide")
      responses:
        '200':
          description: Recette suggérée (existante ou nouvellement créée par le LLM)
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipe:
                    $ref: '#/components/schemas/PlanningRecipe'
              example:
                recipe:
                  id: "019701a2-d3e4-7000-b5f6-000000000001"
                  name: "Poulet rôti aux herbes"
                  kcal: 480.0
                  proteines: 42.0
                  glucides: 5.0
                  lipides: 30.0
                  prep_time: 15
                  cook_time: 60
                  description: null
        '422':
          description: Paramètres de route invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Réponse LLM invalide (recipe_id ou name manquant)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Réponse LLM invalide : recipe_id manquant"

  # ─── Stock ───────────────────────────────────────────────────

  /stock:
    get:
      summary: Liste le stock alimentaire
      tags: [Stock]
      description: Trié par date de péremption croissante (nulls en dernier), puis par nom.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StockItem'
              example:
                data:
                  - id: "019701a2-d3e4-7000-b5f6-000000000002"
                    food_name: "Flocons d'avoine"
                    food_id: "oat123"
                    food_source: "openfoodfacts"
                    food_brand: "Bjorg"
                    food_barcode: "3123456789012"
                    per100g_kcal: 370
                    per100g_proteines: 13
                    per100g_glucides: 58
                    per100g_lipides: 7
                    quantity_g: 500
                    unit: "g"
                    category: "Sec"
                    state: null
                    expiry_date: "2026-12-31"
                    created_at: "2026-06-27T10:00:00.000000Z"
                    updated_at: "2026-06-27T10:00:00.000000Z"
                  - id: "019701a2-d3e4-7000-b5f6-000000000003"
                    food_name: "Riz basmati"
                    food_id: null
                    food_source: null
                    food_brand: null
                    food_barcode: null
                    per100g_kcal: null
                    per100g_proteines: null
                    per100g_glucides: null
                    per100g_lipides: null
                    quantity_g: 1000
                    unit: "g"
                    category: "Sec"
                    state: null
                    expiry_date: null
                    created_at: "2026-06-27T10:00:00.000000Z"
                    updated_at: "2026-06-27T10:00:00.000000Z"

    post:
      summary: Ajouter un aliment au stock
      tags: [Stock]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [food_name, quantity_g]
              properties:
                food_name:
                  type: string
                  maxLength: 255
                food_id:
                  type: string
                  nullable: true
                  maxLength: 255
