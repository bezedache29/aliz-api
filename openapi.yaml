openapi: 3.0.3
info:
  title: Aliz API
  version: 1.0.0
  description: API backend pour l'application mobile Aliz (nutrition & planning).

servers:
  - url: https://{domain}/api
    description: Local dev via Traefik (Sail)
    variables:
      domain:
        default: aliz-api.dev.localhost
        description: Valeur de APP_DOMAIN dans .env

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Token statique défini dans .env → STATIC_API_TOKEN"

  schemas:
    RecipeIngredientInput:
      type: object
      required:
        - food_id
        - food_name
        - food_source
        - per100g_kcal
        - per100g_proteines
        - per100g_glucides
        - per100g_lipides
        - per100g_fibres
        - per100g_sel
        - quantity_g
      properties:
        food_id:
          type: string
        food_name:
          type: string
        food_source:
          type: string
          enum: [openfoodfacts, ciqual, aprifel, manual]
        food_brand:
          type: string
          nullable: true
        food_barcode:
          type: string
          nullable: true
        per100g_kcal:
          type: number
          minimum: 0
        per100g_proteines:
          type: number
          minimum: 0
        per100g_glucides:
          type: number
          minimum: 0
        per100g_lipides:
          type: number
          minimum: 0
        per100g_fibres:
          type: number
          minimum: 0
        per100g_sel:
          type: number
          minimum: 0
        quantity_g:
          type: number
          minimum: 0

    Recipe:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "019701a2-d3e4-7000-b5f6-000000000001"
        name:
          type: string
        category:
          type: string
          enum:
            - Petit-déjeuner
            - Brunch
            - Entrée
            - Plat principal
            - Soupe
            - Dessert
            - Encas
            - Apéritif
            - Boulangerie
            - Sauce & condiments
        meal:
          type: string
          nullable: true
          enum:
            - Petit-déjeuner
            - Déjeuner
            - Collation
            - Dîner
            - ~
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/RecipeIngredientInput'
        steps:
          type: array
          items:
            type: string
        is_favorite:
          type: boolean
        prep_time:
          type: integer
          nullable: true
          description: Temps de préparation en minutes
        cook_time:
          type: integer
          nullable: true
          description: Temps de cuisson en minutes
        seasons:
          type: array
          items:
            type: string
            enum: [Printemps, Été, Automne, Hiver]
        cooking_method:
          type: string
          nullable: true
          enum: [Four, Poêle, Cookeo, Barbecue, Froid, ~]

    PlanningRecipe:
      type: object
      description: Résumé d'une recette tel que retourné par le planning (macros calculées)
      properties:
        id:
          type: string
          format: uuid
          example: "019701a2-d3e4-7000-b5f6-000000000001"
        name:
          type: string
        kcal:
          type: number
        proteines:
          type: number
        glucides:
          type: number
        lipides:
          type: number
        prep_time:
          type: integer
          nullable: true
        cook_time:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true

    PlanningMeal:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-06-23"
        meal_type:
          type: string
          enum: [Petit-déjeuner, Déjeuner, Collation, Dîner]
        recipe:
          $ref: '#/components/schemas/PlanningRecipe'

    StockItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "019701a2-d3e4-7000-b5f6-000000000002"
        food_name:
          type: string
        food_id:
          type: string
          nullable: true
        food_source:
          type: string
          nullable: true
        food_brand:
          type: string
          nullable: true
        food_barcode:
          type: string
          nullable: true
        per100g_kcal:
          type: number
          nullable: true
        per100g_proteines:
          type: number
          nullable: true
        per100g_glucides:
          type: number
          nullable: true
        per100g_lipides:
          type: number
          nullable: true
        quantity_g:
          type: number
        expiry_date:
          type: string
          format: date
          nullable: true
          description: Format YYYY-MM-DD
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

paths:

  # ─── Recettes ───────────────────────────────────────────────

  /recipes:
    get:
      summary: Liste toutes les recettes
      tags: [Recettes]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Recipe'
              example:
                recipes:
                  - id: "018f1e2a-0000-7000-8000-000000000001"
                    name: "Omelette au fromage"
                    category: "Plat principal"
                    meal: "Déjeuner"
                    ingredients: []
                    steps: ["Battre les œufs", "Cuire à feu moyen"]
                    is_favorite: false
                    prep_time: 5
                    cook_time: 10
                    seasons: ["Printemps", "Été", "Automne", "Hiver"]
                    cooking_method: "Poêle"

    post:
      summary: Créer une recette
      tags: [Recettes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, category, ingredients, steps, seasons]
              properties:
                name:
                  type: string
                  maxLength: 255
                category:
                  type: string
                  enum:
                    - Petit-déjeuner
                    - Brunch
                    - Entrée
                    - Plat principal
                    - Soupe
                    - Dessert
                    - Encas
                    - Apéritif
                    - Boulangerie
                    - Sauce & condiments
                meal:
                  type: string
                  nullable: true
                  enum: [Petit-déjeuner, Déjeuner, Collation, Dîner]
                ingredients:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/RecipeIngredientInput'
                steps:
                  type: array
                  items:
                    type: string
                    minLength: 1
                is_favorite:
                  type: boolean
                  default: false
                prep_time:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 65535
                cook_time:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 65535
                seasons:
                  type: array
                  items:
                    type: string
                    enum: [Printemps, Été, Automne, Hiver]
                cooking_method:
                  type: string
                  nullable: true
                  enum: [Four, Poêle, Cookeo, Barbecue, Froid]
      responses:
        '201':
          description: Recette créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Recipe'
        '422':
          description: Validation échouée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /recipes/{uuid}:
    parameters:
      - name: uuid
        in: path
        required: true
        description: UUID de la recette
        example: "019701a2-d3e4-7000-b5f6-000000000001"
        schema:
          type: string
          format: uuid

    put:
      summary: Modifier une recette
      tags: [Recettes]
      description: Tous les champs sont optionnels. Si `ingredients` est fourni, les anciens ingrédients sont remplacés.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                category:
                  type: string
                  enum:
                    - Petit-déjeuner
                    - Brunch
                    - Entrée
                    - Plat principal
                    - Soupe
                    - Dessert
                    - Encas
                    - Apéritif
                    - Boulangerie
                    - Sauce & condiments
                meal:
                  type: string
                  nullable: true
                  enum: [Petit-déjeuner, Déjeuner, Collation, Dîner]
                ingredients:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/RecipeIngredientInput'
                steps:
                  type: array
                  items:
                    type: string
                is_favorite:
                  type: boolean
                prep_time:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 65535
                cook_time:
                  type: integer
                  nullable: true
                  minimum: 0
                  maximum: 65535
                seasons:
                  type: array
                  items:
                    type: string
                    enum: [Printemps, Été, Automne, Hiver]
                cooking_method:
                  type: string
                  nullable: true
                  enum: [Four, Poêle, Cookeo, Barbecue, Froid]
      responses:
        '200':
          description: Recette mise à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Recipe'
        '404':
          description: Recette introuvable
        '422':
          description: Validation échouée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      summary: Supprimer une recette
      tags: [Recettes]
      responses:
        '204':
          description: Supprimée avec succès
        '404':
          description: Recette introuvable

  # ─── Planning ────────────────────────────────────────────────

  /planning/week:
    get:
      summary: Planning de la semaine
      tags: [Planning]
      description: |
        Retourne les repas planifiés sur 7 jours à partir de `from` (inclus).
        Seuls les slots avec une recette assignée sont retournés (recipe_id non null).
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Premier jour de la semaine (YYYY-MM-DD). La réponse couvre `from` à `from + 6 jours`.
          example: "2026-06-23"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  meals:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlanningMeal'
              example:
                meals:
                  - date: "2026-06-23"
                    meal_type: "Déjeuner"
                    recipe:
                      id: "018f1e2a-0000-7000-8000-000000000001"
                      name: "Omelette au fromage"
                      kcal: 320.5
                      proteines: 22.0
                      glucides: 1.5
                      lipides: 25.0
                      prep_time: 5
                      cook_time: 10
                      description: null
                  - date: "2026-06-24"
                    meal_type: "Dîner"
                    recipe:
                      id: "019701a2-d3e4-7000-b5f6-000000000001"
                      name: "Poulet rôti"
                      kcal: 480.0
                      proteines: 42.0
                      glucides: 5.0
                      lipides: 30.0
                      prep_time: 15
                      cook_time: 60
                      description: null
        '422':
          description: Paramètre `from` manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /planning/week/{dateKey}/meals/{mealType}/regenerate:
    post:
      summary: Régénérer un repas via LLM
      tags: [Planning]
      parameters:
        - name: dateKey
          in: path
          required: true
          schema:
            type: string
            format: date
          description: Date du repas (YYYY-MM-DD)
          example: "2026-06-23"
        - name: mealType
          in: path
          required: true
          schema:
            type: string
            enum: [Petit-déjeuner, Déjeuner, Collation, Dîner]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  nullable: true
                  maxLength: 500
                  description: Contrainte libre envoyée au LLM (ex. "sans gluten", "rapide")
      responses:
        '200':
          description: Recette suggérée (existante ou nouvellement créée par le LLM)
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipe:
                    $ref: '#/components/schemas/PlanningRecipe'
        '422':
          description: Paramètres de route invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Réponse LLM invalide (recipe_id ou name manquant)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Réponse LLM invalide : recipe_id manquant"

  # ─── Stock ───────────────────────────────────────────────────

  /stock:
    get:
      summary: Liste le stock alimentaire
      tags: [Stock]
      description: Trié par date de péremption croissante (nulls en dernier), puis par nom.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StockItem'

    post:
      summary: Ajouter un aliment au stock
      tags: [Stock]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [food_name, quantity_g]
              properties:
                food_name:
                  type: string
                  maxLength: 255
                food_id:
                  type: string
                  nullable: true
                  maxLength: 255
                food_source:
                  type: string
                  nullable: true
                  maxLength: 100
                food_brand:
                  type: string
                  nullable: true
                  maxLength: 255
                food_barcode:
                  type: string
                  nullable: true
                  maxLength: 100
                per100g_kcal:
                  type: number
                  nullable: true
                  minimum: 0
                per100g_proteines:
                  type: number
                  nullable: true
                  minimum: 0
                per100g_glucides:
                  type: number
                  nullable: true
                  minimum: 0
                per100g_lipides:
                  type: number
                  nullable: true
                  minimum: 0
                quantity_g:
                  type: number
                  minimum: 0.01
                expiry_date:
                  type: string
                  format: date
                  nullable: true
                  description: Format YYYY-MM-DD
      responses:
        '201':
          description: Aliment ajouté
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/StockItem'
        '422':
          description: Validation échouée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /stock/{uuid}:
    parameters:
      - name: uuid
        in: path
        required: true
        description: UUID de l'aliment en stock
        example: "019701a2-d3e4-7000-b5f6-000000000002"
        schema:
          type: string
          format: uuid

    put:
      summary: Modifier un aliment du stock
      tags: [Stock]
      description: Tous les champs sont optionnels.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                food_name:
                  type: string
                  maxLength: 255
                food_id:
                  type: string
                  nullable: true
                food_source:
                  type: string
                  nullable: true
                food_brand:
                  type: string
                  nullable: true
                food_barcode:
                  type: string
                  nullable: true
                per100g_kcal:
                  type: number
                  nullable: true
                  minimum: 0
                per100g_proteines:
                  type: number
                  nullable: true
                  minimum: 0
                per100g_glucides:
                  type: number
                  nullable: true
                  minimum: 0
                per100g_lipides:
                  type: number
                  nullable: true
                  minimum: 0
                quantity_g:
                  type: number
                  minimum: 0.01
                expiry_date:
                  type: string
                  format: date
                  nullable: true
      responses:
        '200':
          description: Aliment mis à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/StockItem'
        '404':
          description: Aliment introuvable
        '422':
          description: Validation échouée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      summary: Supprimer un aliment du stock
      tags: [Stock]
      responses:
        '204':
          description: Supprimé avec succès
        '404':
          description: Aliment introuvable

  # ─── Poids ───────────────────────────────────────────────────

  /weight:
    get:
      summary: Historique des pesées
      tags: [Poids]
      description: "Non implémenté (TODO)"
      responses:
        '200':
          description: OK

    post:
      summary: Enregistrer une pesée
      tags: [Poids]
      description: "Non implémenté (TODO)"
      responses:
        '201':
          description: Créé

  /weight/sync-renpho:
    post:
      summary: Synchroniser les données Renpho
      tags: [Poids]
      description: "Non implémenté (TODO)"
      responses:
        '200':
          description: OK

  /weight/{uuid}:
    parameters:
      - name: uuid
        in: path
        required: true
        description: UUID de la pesée
        example: "019701a2-d3e4-7000-b5f6-000000000003"
        schema:
          type: string
          format: uuid
    delete:
      summary: Supprimer une pesée
      tags: [Poids]
      description: "Non implémenté (TODO)"
      responses:
        '204':
          description: Supprimé

  # ─── Profil ──────────────────────────────────────────────────

  /profile:
    get:
      summary: Afficher le profil
      tags: [Profil]
      description: "Non implémenté (TODO)"
      responses:
        '200':
          description: OK

    put:
      summary: Modifier le profil
      tags: [Profil]
      description: "Non implémenté (TODO)"
      responses:
        '200':
          description: OK

tags:
  - name: Recettes
    description: CRUD des recettes avec ingrédients
  - name: Planning
    description: Planning hebdomadaire et régénération LLM
  - name: Stock
    description: Gestion du stock alimentaire
  - name: Poids
    description: Suivi du poids (non implémenté)
  - name: Profil
    description: Profil utilisateur (non implémenté)
